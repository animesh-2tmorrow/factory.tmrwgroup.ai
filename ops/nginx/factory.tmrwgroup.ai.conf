upstream venture_factory_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name factory.tmrwgroup.ai;

    client_max_body_size 64k;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://factory.tmrwgroup.ai$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name factory.tmrwgroup.ai;

    ssl_certificate /etc/letsencrypt/live/factory.tmrwgroup.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/factory.tmrwgroup.ai/privkey.pem;

    client_max_body_size 256k;

    # Keep long-running SSE chat turns stable.
    location ~* ^/api/agents/[^/]+/chat$ {
        proxy_pass http://venture_factory_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        send_timeout 300s;
    }

    location /api/health {
        proxy_pass http://venture_factory_app/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://venture_factory_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
